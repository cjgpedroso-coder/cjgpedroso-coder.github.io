<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Screen Finder</title></head>
<body style="background:#111;color:#eee;font-family:monospace;padding:20px">
<pre id="out">Loading...</pre>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
const out = document.getElementById('out');
let text = '';
function log(m) { text += m + '\n'; out.textContent = text; }

new GLTFLoader().load('assets/models/notebook.glb', function(gltf) {
    const model = gltf.scene;
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const scale = 2.5 / Math.max(size.x, size.y, size.z);
    const center = box.getCenter(new THREE.Vector3());
    model.scale.setScalar(scale);
    model.position.sub(center.multiplyScalar(scale));
    const box2 = new THREE.Box3().setFromObject(model);
    model.position.y -= box2.min.y;
    model.updateMatrixWorld(true);

    log('=== MESH ANALYSIS (scaled) ===\n');
    model.traverse(function(child) {
        if (!child.isMesh) return;
        const b = new THREE.Box3().setFromObject(child);
        const s = b.getSize(new THREE.Vector3());
        const c = b.getCenter(new THREE.Vector3());
        const verts = child.geometry.attributes.position.count;
        log(child.name + ' (' + verts + ' verts)');
        log('  Center: x=' + c.x.toFixed(4) + ' y=' + c.y.toFixed(4) + ' z=' + c.z.toFixed(4));
        log('  Size:   w=' + s.x.toFixed(4) + ' h=' + s.y.toFixed(4) + ' d=' + s.z.toFixed(4));
        log('  Min:    x=' + b.min.x.toFixed(4) + ' y=' + b.min.y.toFixed(4) + ' z=' + b.min.z.toFixed(4));
        log('  Max:    x=' + b.max.x.toFixed(4) + ' y=' + b.max.y.toFixed(4) + ' z=' + b.max.z.toFixed(4));
        log('');
    });

    // Check overall model bounds
    const mb = new THREE.Box3().setFromObject(model);
    const ms = mb.getSize(new THREE.Vector3());
    const mc = mb.getCenter(new THREE.Vector3());
    log('MODEL TOTAL:');
    log('  Center: ' + mc.x.toFixed(4) + ', ' + mc.y.toFixed(4) + ', ' + mc.z.toFixed(4));
    log('  Size:   ' + ms.x.toFixed(4) + ', ' + ms.y.toFixed(4) + ', ' + ms.z.toFixed(4));
});
</script></body></html>
